<script>
    
    

function gradeBM(score){
  if(score>=85)return 4;
  if(score>=80)return 3.67;
  if(score>=75)return 3.33;
  if(score>=70)return 3;
  if(score>=65)return 2.67;
  if(score>=60)return 2.33;
  if(score>=55)return 2;
  if(score>=50)return 1.67;
  if(score>=45)return 1.33;
  if(score>=40)return 1;
  return 0;
}

function gradeBI(score){
  if(score>=80)return 4;
  if(score>=75)return 3.67;
  if(score>=70)return 3.33;
  if(score>=65)return 3;
  if(score>=60)return 2.67;
  if(score>=55)return 2.33;
  if(score>=50)return 2;
  if(score>=45)return 1.67;
  if(score>=40)return 1.33;
  if(score>=35)return 1;
  return 0;
}

function gradeMath(score){ return gradeBI(score); }

function gradeAddMath(score){
  if(score>=75)return 4;
  if(score>=65)return 3.67;
  if(score>=60)return 3.33;
  if(score>=55)return 3;
  if(score>=50)return 2.67;
  if(score>=45)return 2.33;
  if(score>=40)return 2;
  if(score>=35)return 1.67;
  if(score>=30)return 1.33;
  if(score>=25)return 1;
  return 0;
}

function gradePhy(score){
  if(score>=75)return 4;
  if(score>=70)return 3.67;
  if(score>=65)return 3.33;
  if(score>=60)return 3;
  if(score>=55)return 2.67;
  if(score>=50)return 2.33;
  if(score>=45)return 2;
  if(score>=40)return 1.67;
  if(score>=35)return 1.33;
  if(score>=30)return 1;
  return 0;
}

function gradeChem(score){ return gradePhy(score); }
function gradeBio(score){ return gradePhy(score); }

function gradeAkaun(score){
  if(score>=85)return 4;
  if(score>=80)return 3.67;
  if(score>=75)return 3.33;
  if(score>=70)return 3;
  if(score>=65)return 2.67;
  if(score>=60)return 2.33;
  if(score>=55)return 2;
  if(score>=50)return 1.67;
  if(score>=45)return 1.33;
  return 0;
}

function gradeSej(score){
  if(score>=85)return 4;
  if(score>=80)return 3.67;
  if(score>=75)return 3.33;
  if(score>=70)return 3;
  if(score>=65)return 2.67;
  if(score>=60)return 2.33;
  if(score>=55)return 2;
  if(score>=50)return 1.67;
  if(score>=45)return 1.33;
  if(score>=40)return 1;
  return 0;
}

function gradeIslam(score){ return gradeSej(score); }
function gradePJ(score){ return gradeSej(score); }



function pointerToGrade(p){
  if(p>=4.00)return "A";
  if(p>=3.67)return "A-";
  if(p>=3.33)return "B+";
  if(p>=3.00)return "B";
  if(p>=2.67)return "B-";
  if(p>=2.33)return "C+";
  if(p>=2.00)return "C";
  if(p>=1.67)return "C-";
  if(p>=1.33)return "D";
  if(p>=1.00)return "E";
  return "F";
}



const subjects = [
  {id:"melayu", fn:gradeBM},
  {id:"inggeris", fn:gradeBI},
  {id:"math", fn:gradeMath},
  {id:"addmath", fn:gradeAddMath},
  {id:"phy", fn:gradePhy},
  {id:"chem", fn:gradeChem},
  {id:"sej", fn:gradeSej},
  {id:"islam", fn:gradeIslam},
];

subjects.forEach(sub=>{
  const input = document.getElementById(sub.id);
  const gradeBox = document.getElementById("gred-" + sub.id);
  input.addEventListener("input", ()=>{
    const mark = parseFloat(input.value);
    if(isNaN(mark)){
      gradeBox.value="";
      return;
    }
    gradeBox.value = pointerToGrade(sub.fn(mark));
  });
});

const bioAkaunInput = document.getElementById("markah");
const bioAkaunGrade = document.getElementById("gred-bioakaun");
const subjekSelect = document.getElementById("subjek");

function updateBioAkaunGrade(){
  const mark = parseFloat(bioAkaunInput.value);
  const subjek = subjekSelect.value;

  if(isNaN(mark) || !subjek){
    bioAkaunGrade.value="";
    return;
  }

  let p = subjek==="bio" ? gradeBio(mark) : gradeAkaun(mark);
  bioAkaunGrade.value = pointerToGrade(p);
}

bioAkaunInput.addEventListener("input", updateBioAkaunGrade);
subjekSelect.addEventListener("change", updateBioAkaunGrade);

const pjInput = document.getElementById("pj");
const pjGrade = document.getElementById("gred-pj");

pjInput.addEventListener("input", ()=>{
  const mark = parseFloat(pjInput.value);
  if(isNaN(mark)){
    pjGrade.value = "";
    return;
  }
  pjGrade.value = pointerToGrade(gradePJ(mark));
});


</script>

<script>
function toggleExtraFields(show) { 
    document.getElementById('extra-fields').style.display = show ? 'block' : 'none'; 
}

document.querySelectorAll('input[type="number"]').forEach(input => {
    input.addEventListener('input', () => {
        input.value = input.value.replace(/[^0-9]/g, '');
        if(input.value > 100) input.value = 100;
        if(input.value < 0) input.value = 0;
    });
});

function updatePlaceholder(){
  const subjek = document.getElementById("subjek").value;
  const input = document.getElementById("markah");
  if(subjek === "bio"){ input.placeholder = "Biology"; input.disabled = false; }
  else if(subjek === "akaun"){ input.placeholder = "Akaun"; input.disabled = false; }
}



function calculatePNG(isFormative) {
    let nama = document.getElementById("nama").value;
    let inputs = ["melayu","inggeris","math","addmath","phy","chem","markah","sej","islam"]; 
    if(!isFormative) inputs.push("pj");

    for(let id of inputs){
        let element = document.getElementById(id);
        if(element && element.value === "") {
            alert("Please fill in your marks before you can calculate your PNG!"); 
            return; 
        }
    }

    let melayu = parseFloat(document.getElementById("melayu").value);
    let inggeris = parseFloat(document.getElementById("inggeris").value);
    let math = parseFloat(document.getElementById("math").value);
    let addmath = parseFloat(document.getElementById("addmath").value);
    let phy = parseFloat(document.getElementById("phy").value);
    let chem = parseFloat(document.getElementById("chem").value);
    let bio = parseFloat(document.getElementById("markah").value);
    let sej = parseFloat(document.getElementById("sej").value);
    let islam = parseFloat(document.getElementById("islam").value);
    let pjMark = isFormative ? 0 : parseFloat(document.getElementById("pj").value);
    let pjCredit = isFormative ? 0 : parseInt(document.querySelector('input[name="pjcredit"]:checked').value);

    let Bm = gradeBM(melayu)*6;
    let Bi = gradeBI(inggeris)*6;
    let Mt = gradeMath(math)*6;
    let Admt = gradeAddMath(addmath)*7;
    let Sic = gradePhy(phy)*7;
    let Kim = gradeChem(chem)*7;
    let Sj = gradeSej(sej)*4;
    let Pi = gradeIslam(islam)*5;
    let subjekDipilih = document.getElementById("subjek").value;
    let Gy = subjekDipilih === "bio" ? gradeBio(bio)*7 : gradeAkaun(bio)*7;
    let Pe = isFormative ? 0 : gradePJ(pjMark) * pjCredit;

    let total = Bm+Bi+Mt+Admt+Sic+Kim+Gy+Sj+Pi+Pe;
    let purata = total / (55 + parseInt(pjCredit));
    document.getElementById("result").innerHTML = "PNG anda ialah: " + purata.toFixed(3);

    let message = "";
    if(purata===4){message="Congratulations "+nama+"!, You got a 4.00 flat this exam. Keep up the good work!";}
    else if(purata>=3.50){message="Congratulations "+nama+"!, Keep up your good work.";}
    else if(purata>=3){message="You have done your best, "+nama+"! Try again in the next exam.";}
    else{message="Don't give up, "+nama+". Study harder and you'll get better results.";}
    document.getElementById("message").innerHTML = message;

    
}
