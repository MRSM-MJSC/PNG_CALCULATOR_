<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNG Calculator Hub</title>

<style>
body {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("bg.JPG");
    background-size: cover;
    background-position: center;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

#topBar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 90px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 28px;
    color: black;
}

.container {
    margin-top: 180px;
}

.btn {
    display: block;
    margin: 20px auto;
    padding: 15px 30px;
    width: 250px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(6px);
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.05);
    background: white;
}
</style>
</head>

<body>

<div id="topBar">PNG Calculator</div>

<div class="container">
    <h1>Pilih Tingkatan</h1>

    <button class="btn" onclick="location.href='lowerform/index.html'">
        Lower Form (F1-F3)
    </button>

    <button class="btn" onclick="location.href='form4/index.html'">
        Form 4
    </button>

    <button class="btn" onclick="location.href='form5/index.html'">
        Form 5
    </button>
</div>

</body>
</html>
